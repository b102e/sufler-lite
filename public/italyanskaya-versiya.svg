<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C853"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <filter id="borderGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="38%" stop-color="#2ECC71"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="62%" stop-color="#ffffff"/>
      <stop offset="75%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <filter id="textGlow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="pillFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#001a00" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#111111" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a0000" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect x="18" y="18" width="1164" height="204" rx="102" ry="102" fill="url(#pillFill)"/>
  <rect x="18" y="18" width="1164" height="204" rx="102" ry="102" fill="none" stroke="url(#borderGrad)" stroke-width="5" filter="url(#borderGlow)" opacity="0.9"/>
  <rect x="18" y="18" width="1164" height="204" rx="102" ry="102" fill="none" stroke="url(#borderGrad)" stroke-width="2.5" opacity="1"/>
  <text x="600" y="126" text-anchor="middle" dominant-baseline="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="80" font-weight="700" letter-spacing="2" fill="url(#textGrad)" filter="url(#textGlow)">Итальянская версия</text>
</svg>
